<html>
<head>
<style>
body {
  margin: 0;

}

h2, p {
  text-align: center;
}

ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  background-color: #333333;
  display: flex;
  justify-content: center;
}

ul li a {
  display: block;
  color: white;
  padding: 14px 16px;
  text-decoration: none;
}

ul li a:hover {
  background-color: #111111;
}
</style>
</head>
<body>

<h2>Restaurant Homepage</h2>
<br><br>
<ul>
  <li><a href="{{ url_for('menu.show_menu') }}">Menu</a></li>
    <li><a href="{{ url_for('reservations.reservations_page') }}">Booking</a></li>
    <li><a href="{{ url_for('general.about_page') }}">About Us</a></li>
    <li><a href="{{ url_for('general.contact_page') }}">Contact</a></li>
</ul>

<div style="width: 100%; height: 400px; overflow: hidden;">
    <img src="{{ url_for('static', filename='imgs/img1.jpg') }}"
         alt="Restaurant Img1"
         style="width: 100%; height: 400px; object-fit: cover;">
</div>

<div style="text-align: center; padding: 60px 20px;">
    <h1 style="font-size: 48px; margin-bottom: 20px;">Welcome to [Restaurant Name]</h1>
    <p style="font-size: 24px; color: #666; margin-bottom: 40px;">Fresh Food, Authentic Flavors</p>

    <a href="{{ url_for('menu.show_menu') }}" style="background: #8B0000; color: white;
     padding: 15px 30px; text-decoration: none; border-radius: 8px; margin: 0 10px; font-size: 18px;">View Menu</a>

    <a href="{{ url_for('reservations.reservations_page') }}" style="background: #FFD700; color: #000;

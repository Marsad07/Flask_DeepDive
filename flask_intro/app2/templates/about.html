{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block content %}
<div class="menu-container">
    <h1>ABOUT US</h1>
    <h2>OUR STORY</h2><br>

    {% for section in sections %}
    <h2 style="text-align: left;">{{ section.heading }}</h2>
    <p>{{ section.content }}</p>
    {% endfor %}
</div>
<script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.menu-container h1, .menu-container h2, .menu-container p').forEach(el => {
        observer.observe(el);
    });
</script>
{% endblock %}

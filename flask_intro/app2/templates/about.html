{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block content %}
<div class="about-page">

  <!-- This is the page header -->
  <div class="about-header">
    <h1>ABOUT US</h1>
    <p class="about-tagline">Our story, our passion, our craft</p>
    <div class="about-header-divider"></div>
  </div>

  <!-- This is the story section title -->
  <div class="about-body">
    <p class="about-section-eyebrow">OUR STORY</p>

    <!-- This loops through each content section -->
    {% for section in sections %}
    <div class="about-section">
      <h2 class="about-section-heading">{{ section.heading }}</h2>
      <p class="about-section-content">{{ section.content }}</p>
    </div>
    {% endfor %}
  </div>

</div>

<script>
  // This is for the scroll animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll(
    '.about-header, .about-section-eyebrow, .about-section'
  ).forEach(el => observer.observe(el));
</script>
{% endblock %}

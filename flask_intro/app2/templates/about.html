{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/about.css') }}">
{% endblock %}

{% block content %}
<div class="about-page">
    <div class="about-header">
        <h1>ABOUT US</h1>
        <p class="about-tagline">Our story, our passion, our craft</p>
        <div class="about-header-divider"></div>
    </div>

    <div class="about-body">
        <p class="about-section-eyebrow">OUR STORY</p>

        {% for section in sections %}
        <div class="about-section">
            <h2 class="about-section-heading">{{ section.heading }}</h2>
            <p class="about-section-content">{{ section.content }}</p>
        </div>
        {% endfor %}
    </div>

</div>
{% block scripts %}
<script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1 });

    document.querySelectorAll(
        '.about-header, .about-section-eyebrow, .about-section'
    ).forEach(el => observer.observe(el));
</script>
{% endblock %}

{% endblock %}

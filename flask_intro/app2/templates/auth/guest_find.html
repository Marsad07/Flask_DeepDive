{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/customer.css') }}">
{% endblock %}

{% block content %}

<a href="{{ url_for('general.home_page') }}" class="customer-back-link">
    ← Back to Home
</a>

<div class="customer-page-wrapper">

  <h1 class="customer-page-title">Find Your Reservation</h1>
  <p class="customer-page-subtitle">
      Enter your details to view or manage your booking.
  </p>

  <div class="customer-form-card">
      <form method="POST" action="{{ url_for('guest_lookup.find_reservation') }}">

          <div class="field-group">
              <label class="form-label">Email</label>
              <input type="email" name="email" required
                     value="{{ prefill_email }}">
          </div>

          <div class="field-group">
              <label class="form-label">Phone Number</label>
              <input type="text" name="phone" required
                     value="{{ prefill_phone }}">
          </div>

          <button type="submit" class="customer-form-submit">
              Find Reservation
          </button>

      </form>
  </div>
</div>
{% endblock %}

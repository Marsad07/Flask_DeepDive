{% extends "base.html" %}

{% block content %}
<div class="resv-wrapper">
  <div class="resv-card">

    <a href="{{ url_for('general.home_page') }}" class="back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 3L5 8L10 13" stroke="#8B0000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>

    <h2>Find Your Reservation</h2>
    <p class="resv-subtitle">Enter your details to view or manage your booking.</p>
    <div class="form-divider"></div>

    <form method="POST">
      <div class="form-group full-width">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
      <br><br>
      <div class="form-group full-width">
        <label>Phone Number</label>
        <input type="text" name="phone" required>
      </div>

      <div class="submit-row">
        <button type="submit" class="btn-save">Find Reservation</button>
      </div>
    </form>

  </div>
</div>
{% endblock %}

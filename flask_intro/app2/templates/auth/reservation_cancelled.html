{% extends "base.html" %}

{% block content %}
<div class="menu-container" style="text-align:center; font-family:Georgia, serif;">

    <h2 style="color:#2C2416; margin-bottom:20px;">
        Reservation Cancelled
    </h2>

    <p style="color:#5C4033; font-size:18px; margin-bottom:30px;">
        Table <strong>{{ table }}</strong> is now available again.
    </p>

    <a href="{{ url_for('general.home_page') }}"
       style="display:inline-block; padding:14px 28px; background:#8B0000;
              color:#FFD700; font-size:18px; font-weight:bold; border:none;
              border-radius:8px; cursor:pointer; text-decoration:none;
              text-transform:uppercase; letter-spacing:1px;">
        Return Home
    </a>
</div>
{% endblock %}

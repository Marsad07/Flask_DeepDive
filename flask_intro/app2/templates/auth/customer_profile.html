{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block content %}
<div class="menu-container">
    <h1>PROFILE SETTINGS</h1>

    {% if success %}
    <p style="color: #28a745; text-align: center; background: #d4edda; padding: 15px;
      border-radius: 8px; margin: 20px auto; max-width: 600px; border: 1px solid #28a745;">
        {{ success }}
    </p>
    {% endif %}

    {% if error %}
    <p style="color: #8B0000; text-align: center; background: #FFE6E6; padding: 15px;
      border-radius: 8px; margin: 20px auto; max-width: 600px;">
        {{ error }}
    </p>
    {% endif %}

    <form method="POST" action="{{ url_for('customer_auth.update_profile') }}"
          style="max-width: 600px; margin: 40px auto;">
        <h2 style="color: #8B0000; margin-bottom: 30px;">Account Information</h2>

        <label>Full Name</label>
        <input type="text" name="customer_fullname" value="{{ customer.customer_fullname }}" required>

        <label>Email Address</label>
        <input type="email" name="customer_email" value="{{ customer.customer_email }}" required>

        <label>Phone Number</label>
        <input type="tel" name="customer_phonenum" value="{{ customer.customer_phonenum }}"
               pattern="[0-9]{10,}" required>

        <h2 style="color: #8B0000; margin-top: 50px; margin-bottom: 30px;">Change Password (Optional)</h2>

        <label>New Password</label>
        <input type="password" name="new_password" placeholder="Leave blank to keep current password" minlength="6">

        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" placeholder="Re-enter new password">

        <input type="submit" value="UPDATE PROFILE">
    </form>
    <p style="text-align: center; margin-top: 30px;">
        <a href="{{ url_for('customer_auth.customer_dashboard') }}"
           style="color: #8B0000; text-decoration: none; font-weight: bold;">
            ← Back to Dashboard
        </a>
    </p>
</div>
{% endblock %}

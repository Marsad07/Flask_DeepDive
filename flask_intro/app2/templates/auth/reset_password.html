{% extends 'base.html' %}
{% block content %}
<div class="menu-container">
    <h1>SET NEW PASSWORD</h1>

    {% if error %}
    <p style="color: #8B0000; text-align: center; background: #FFE6E6; padding: 15px;
      border-radius: 8px; margin: 20px auto; max-width: 500px;">
        {{ error }}
    </p>
    {% endif %}
    {% if not token %}
        <div style="text-align: center; padding: 30px; font-family: Georgia, serif;">
            <p style="color: #8B0000; font-size: 16px;">
                ⚠ This reset link is invalid or has expired.
            </p>
             <a href="{{ url_for('customer_auth.forgot_password') }}"
               style="color: #8B0000; font-family: Georgia, serif;">
                Request a new reset link
            </a>
        </div>
    {% else %}
         <form method="POST" style="max-width: 500px; margin: 40px auto;">
            <input type="hidden" name="token" value="{{ token }}">

            <label for="new_password">New Password</label>
            <input type="password" name="new_password" id="new_password" required autofocus>

            <label for="confirm_password">Confirm New Password</label>
            <input type="password" name="confirm_password" id="confirm_password" required>

            <input type="submit" value="RESET PASSWORD">
        </form>
    {% endif %}

    <p style="text-align: center; margin-top: 20px; font-family: Georgia, serif;">
        <a href="{{ url_for('customer_auth.login') }}"
           style="color: #8B0000; text-decoration: none;">
            ← Back to Login
        </a>
    </p>
</div>

{% endblock %}

{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<!-- Toast notification -->
<div id="toast" class="toast">
    <span class="toast-icon">⚠️</span>
    <span id="toast-msg"></span>
    <button class="toast-close" onclick="closeToast()">✕</button>
</div>

<div class="login-page">
    <div class="login-card">

        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to your account</p>

        <!-- Customer / Staff toggle -->
        <div class="toggle-wrap">
            <div class="toggle-slider" id="toggle-slider"></div>
            <button type="button" class="toggle-btn active" id="btn-customer" onclick="leftClick()">
                Customer
            </button>
            <button type="button" class="toggle-btn" id="btn-staff" onclick="rightClick()">
                Staff
            </button>
        </div>

        <!-- Login form -->
        <form method="POST" class="login-form">
            <div class="field-group">
                <label for="customer_email">Email Address</label>
                <input type="email" id="customer_email" name="customer_email" required autofocus>
            </div>
            <div class="field-group">
                <label for="customer_password">Password</label>
                <input type="password" id="customer_password" name="customer_password" required>
                <div class="forgot-link">
                    <a href="{{ url_for('customer_auth.forgot_password') }}">Forgot your password?</a>
                </div>
            </div>
            <input type="submit" value="LOGIN">
        </form>

        <p class="login-link" style="margin-top: 24px;">
            Don't have an account?
            <a href="{{ url_for('customer_auth.register') }}">Create one here</a>
        </p>

        <p class="login-link" style="margin-top: 12px;">
            <a href="{{ url_for('general.home_page') }}">← Back to Main Site</a>
        </p>

    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    {% if error %}
    window.addEventListener('DOMContentLoaded', function() {
        showToast("{{ error }}");
    });
    {% endif %}

    function showToast(message) {
        document.getElementById('toast-msg').textContent = message;
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(closeToast, 4000);
    }

    function closeToast() {
        document.getElementById('toast').classList.remove('show');
    }

    var slider = document.getElementById('toggle-slider');

    function leftClick() {
        slider.style.left = '4px';
        document.getElementById('btn-customer').classList.add('active');
        document.getElementById('btn-staff').classList.remove('active');
        setTimeout(function() {
            window.location.href = "{{ url_for('customer_auth.login') }}";
        }, 350);
    }

    function rightClick() {
        slider.style.left = 'calc(50%)';
        document.getElementById('btn-staff').classList.add('active');
        document.getElementById('btn-customer').classList.remove('active');
        setTimeout(function() {
            window.location.href = "{{ url_for('staff.staff_login') }}";
        }, 350);
    }
</script>
{% endblock %}

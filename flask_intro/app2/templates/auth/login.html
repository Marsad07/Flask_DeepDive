{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block content %}
<div class="menu-container">
    <h1>CUSTOMER LOGIN</h1>
    <h3>Restaurant Customer Portal</h3>
    {% if error %}
    <p style="color: #8B0000; text-align: center; background: #FFE6E6; padding: 15px;
      border-radius: 8px; margin: 20px auto; max-width: 500px;">
        {{ error }}
    </p>
    {% endif %}
    <div class="form-box">
    <div class="button-box">
        <div id="btn"></div>
        <button type="button" class="toggle-btn" onclick="leftClick()">Customer</button>
        <button type="button" class="toggle-btn" onclick="rightClick()">Staff</button>
    </div>
    </div>

    <form method="POST" style="max-width: 500px; margin: 40px auto;">
        <label for="customer_email">Email Address</label>
        <input type="email" id="customer_email" name="customer_email" required autofocus>

        <label for="customer_password">Password</label>
        <input type="password" id="customer_password" name="customer_password" required>

        <input type="submit" value="LOGIN">
    </form>

    <p style="text-align: center; margin-top: 20px; color: #5C4033;">
        Don't have an account?
        <a href="{{ url_for('customer_auth.register') }}"
           style="color: #8B0000; text-decoration: none; font-weight: bold;">Create one here</a>
    </p>

    <p style="text-align: center; margin-top: 15px; color: #5C4033; font-size: 14px;">
        <a href="{{ url_for('general.home_page') }}"
           style="color: #8B0000; text-decoration: none;">← Back to Main Site</a>
    </p>
</div>
<script>
    var btn = document.getElementById('btn')
    function leftClick() {
        btn.style.left = '0';
        setTimeout(function() {
            window.location.href = "{{ url_for('customer_auth.login') }}";
        }, 500);
    }

    function rightClick() {
        btn.style.left = '110px';
        setTimeout(function() {
            window.location.href = "{{ url_for('staff.staff_login') }}";
        }, 500);
    }
</script>
{% endblock %}

{% extends "admin_base.html" %}
{% block admin_content %}
<div class="menu-container">
    <h1>MANAGE ABOUT US</h1>
    <!-- This is for adding new section -->
    <div class="dash-card dash-card-body" style="margin: 20px 0;">
        <h3 style="color: var(--color-text); font-family: var(--font-heading); margin-bottom: 20px;">
            Add New Section
        </h3>
        <form action="{{ url_for('admin.add_about_section') }}" method="POST" class="inline-form"
              style="display: flex; flex-direction: column; gap: 15px; max-width: 700px;">
            <div>
                <label style="font-weight: bold; color: var(--color-text);
                              display: block; margin-bottom: 5px;">
                    Heading
                </label>
                <input type="text" name="heading" placeholder="e.g. OUR TEAM"
                       class="form-input">
            </div>
            <div>
                <label style="font-weight: bold; color: var(--color-text);
                              display: block; margin-bottom: 5px;">
                    Content
                </label>
                <textarea name="content" rows="4"
                          placeholder="Write your paragraph here..."
                          class="form-textarea"></textarea>
            </div>
            <button type="submit" class="btn-primary" style="width: fit-content;">
                Add Section
            </button>
        </form>
    </div>
    <!-- This shows existing sections -->
    <div class="dash-card dash-card-body" style="margin: 20px 0;">
        <h3 style="color: var(--color-text); font-family: var(--font-heading); margin-bottom: 20px;">
            Current Sections
        </h3>
        {% for section in sections %}
        <div style="border: 1px solid rgba(212,175,55,0.3); border-radius: var(--radius);
                    padding: 20px; margin-bottom: 20px; background: var(--color-bg);">
            <form id="edit-form-{{ section.id }}"
                  action="{{ url_for('admin.update_about_section', section_id=section.id) }}"
                  method="POST" class="inline-form"
                  style="display: flex; flex-direction: column; gap: 12px;">
                <div>
                    <label style="font-weight: bold; color: var(--color-text);
                                  display: block; margin-bottom: 5px;">Heading</label>
                    <input type="text" name="heading" value="{{ section.heading }}"
                           class="form-input">
                </div>
                <div>
                    <label style="font-weight: bold; color: var(--color-text);
                                  display: block; margin-bottom: 5px;">Content</label>
                    <textarea name="content" rows="4"
                              class="form-textarea">{{ section.content }}</textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button"
                            onclick="showConfirm('update', {{ section.id }})"
                            class="btn-primary">
                        Save Changes
                    </button>
                    <button type="button"
                            onclick="showDeleteConfirm({{ section.id }}, '{{ section.heading }}')"
                            class="btn-danger-full" style="width: auto; padding: 8px 20px;">
                        Delete Section
                    </button>
                </div>
            </form>

            <form id="delete-form-{{ section.id }}"
                  action="{{ url_for('admin.delete_about_section', section_id=section.id) }}"
                  method="POST" class="inline-form">
            </form>
        </div>
        {% endfor %}
    </div>
    <a href="{{ url_for('admin.dashboard') }}" class="back-link">
        ← Back to Dashboard
    </a>
</div>

<!-- This is for the update confirmation -->
<div id="confirm-modal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="confirm-title" class="modal-title"></h3>
        <p id="confirm-message" class="modal-message"></p>
        <div class="modal-actions">
            <button onclick="closeConfirm()" class="modal-btn-cancel">Cancel</button>
            <button id="confirm-yes" class="modal-btn-confirm">Confirm</button>
        </div>
    </div>
</div>
<!-- This is for the popup for delete -->
<div id="delete-modal" class="modal-overlay">
    <div class="modal-box">
        <h3 class="modal-title">Delete Section</h3>
        <p id="delete-message" class="modal-message"></p>
        <div class="modal-actions">
            <button onclick="closeDeleteConfirm()" class="modal-btn-cancel">Cancel</button>
            <button id="delete-confirm-btn" class="modal-btn-confirm">Yes, Delete</button>
        </div>
    </div>
</div>
<script>
function showConfirm(type, sectionId) {
    document.getElementById('confirm-title').textContent = 'Save Changes';
    document.getElementById('confirm-message').textContent =
        'Are you sure you want to update this section?';
    document.getElementById('confirm-modal').classList.add('open');
    document.getElementById('confirm-yes').onclick = function() {
        closeConfirm();
        document.getElementById('edit-form-' + sectionId).submit();
    };
}

function closeConfirm() {
    document.getElementById('confirm-modal').classList.remove('open');
}

document.getElementById('confirm-modal').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
});

function showDeleteConfirm(id, heading) {
    document.getElementById('delete-message').textContent =
        'Are you sure you want to delete the "' + heading + '" section? This cannot be undone.';
    document.getElementById('delete-confirm-btn').onclick = function() {
        document.getElementById('delete-form-' + id).submit();
    };
    document.getElementById('delete-modal').classList.add('open');
}

function closeDeleteConfirm() {
    document.getElementById('delete-modal').classList.remove('open');
}

document.getElementById('delete-modal').addEventListener('click', function(e) {
    if (e.target === this) closeDeleteConfirm();
});
</script>
{% endblock %}

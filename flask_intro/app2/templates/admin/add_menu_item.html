{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block content %}
<div class="menu-container">
    <h1>ADD MENU ITEM</h1>
    <a href="{{ url_for('admin.manage_menu') }}"
       style="display: inline-block; color: #8B0000; text-decoration: none; margin: 20px 0; font-weight: bold;">
        ← Back to Menu Management
    </a>

    <form method="POST" style="max-width: 600px; margin: 40px auto;">
        <label for="item_name">Item Name</label>
        <input type="text" id="item_name" name="item_name" required>

        <label style="display: block; font-size: 16px; font-weight: bold; color: #2C2416;
                     margin-botton: 12px;">
            Category
        </label>
        <div style=" display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
            {% for cat in categories %}
            <button type="button"
                    class="category-btn"
                    data-category="{{ cat.category_name }}"
                onclick="selectCategory('{{ cat.category_name }}', this)"
                style="padding: 10px 20px; border: 2px solid #D4AF37; border-radius: 6px;
                       background: white; color: #2C2416; font-family: Georgia, serif; font-size: 14; font-weight: bold;
                       cursor: pointer; transition: all 0.3s ease;">
                {{ cat.category_name }}
            </button>
            {% endfor %}
        </div>
        <input type="hidden" name="category" id="selected-category" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" required></textarea>

        <label for="price">Price (£)</label>
        <input type="number" id="price" name="price" step="0.01" min="0" required>

        <input type="submit" value="ADD ITEM">
    </form>
</div>
<script>
function selectCategory(name, btn) {
    document.querySelectorAll('.category-btn').forEach(b => {
        b.style.background = 'white';
        b.style.color = '#2C2416';
        b.style.borderColor = '#D4AF37';
    });
    btn.style.background = '#8B0000';
    btn.style.color = '#FFD700';
    btn.style.borderColor = '#8B0000';
    document.getElementById('selected-category').value = name;
}

document.addEventListener('DOMContentLoaded', function() {
    const current = document.getElementById('selected-category').value;
    if (current) {
        document.querySelectorAll('.category-btn').forEach(btn => {
            if (btn.dataset.category === current) {
                btn.style.background = '#8B0000';
                btn.style.color = '#FFD700';
                btn.style.borderColor = '#8B0000';
            }
        });
    }
});
</script>
{% endblock %}

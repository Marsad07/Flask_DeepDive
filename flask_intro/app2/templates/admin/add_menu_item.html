{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block content %}
<div class="form-page-wrap">
    <h1>Add Menu Item</h1>
    <a href="{{ url_for('admin.manage_menu') }}" class="back-link">← Back to Menu Management</a>
    <div class="form-card">
        <form method="POST" id="add-form">

            <div class="form-group">
                <label class="form-label" for="item_name">Item Name</label>
                <input class="form-input" type="text" id="item_name" name="item_name" required>
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>
                <div class="category-picker">
                    {% for cat in categories %}
                    <button type="button"
                            class="category-btn"
                            data-category="{{ cat.category_name }}"
                            onclick="selectCategory('{{ cat.category_name }}', this)">
                        {{ cat.category_name }}
                    </button>
                    {% endfor %}
                </div>
                <input type="hidden" name="category" id="selected-category" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea class="form-textarea" id="description" name="description"
                          rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="price">Price (£)</label>
                <input class="form-input" type="number" id="price" name="price"
                       step="0.01" min="0" required>
            </div>

            <button type="button" class="btn-submit" onclick="showConfirm()">Add Item</button>
        </form>
    </div>
</div>
<!-- Confirmation modal -->
<div id="confirm-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
        <h3 id="modal-title">Confirm Add Item</h3>
        <p>Are you sure you want to add this new menu item?</p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
            <button class="btn-confirm" onclick="submitForm()">Yes, Add Item</button>
        </div>
    </div>
</div>
<script>
    function selectCategory(name, btn) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('selected-category').value = name;
    }

    function showConfirm() {
        document.getElementById('confirm-modal').classList.add('open');
    }

    function closeConfirm() {
        document.getElementById('confirm-modal').classList.remove('open');
    }

    function submitForm() {
        document.getElementById('add-form').submit();
    }

    document.getElementById('confirm-modal').addEventListener('click', function (e) {
        if (e.target === this) closeConfirm();
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeConfirm();
    });
</script>
{% endblock %}

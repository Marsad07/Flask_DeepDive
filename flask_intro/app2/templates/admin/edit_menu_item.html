{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block content %}
<div class="menu-container">
    <h1>EDIT MENU ITEM</h1>

    <a href="{{ url_for('admin.manage_menu') }}"
       style="display: inline-block; color: #8B0000; text-decoration: none; margin: 20px 0; font-weight: bold;">
        Back to Menu Management
    </a>

    <form method="POST" style="max-width: 600px; margin: 40px auto;">
        <label for="item_name">Item Name</label>
        <input type="text" id="item_name" name="item_name" value="{{ item.item_name }}" required>

        <label style="display: block; font-size: 16px; font-weight: bold; color: #2C2416;
                     margin-botton: 12px;">
            Category
        </label>
        <div style=" display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
            {% for cat in categories %}
            <button type="button"
                    class="category-btn"
                    data-category="{{ cat.category_name }}"
                onclick="selectCategory('{{ cat.category_name }}', this)"
                style="padding: 10px 20px; border: 2px solid #D4AF37; border-radius: 6px;
                       background: white; color: #2C2416; font-family: Georgia, serif; font-size: 14; font-weight: bold;
                       cursor: pointer; transition: all 0.3s ease;">
                {{ cat.category_name }}
            </button>
            {% endfor %}
        </div>
        <input type="hidden" id="selected-category" name="category" value="{{ item.category }}">

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" required>{{ item.description }}</textarea>

        <label for="price">Price</label>
        <input type="number" id="price" name="price" step="0.01" min="0" value="{{ item.price }}" required>

        <label for="is_available">Availability</label>
        <select id="is_available" name="is_available" required>
            <option value="1">Available</option>
            <option value="0">Sold Out</option>
        </select>

        <label for="prep_time">Prep Time (minutes)</label>
        <input type="number" name="prep_time" id="prep_time" value="{{ item.prep_time }}" min="1" max="60" required>

        <button type="button" onclick="showConfirm()"
            style="width: 100%; padding: 16px; margin-top: 30px; background-color: #8B0000;
                   color: #FFD700; font-size: 18px; font-weight: bold; border: none;
                   border-radius: 8px; cursor: pointer; text-transform: uppercase;
                   letter-spacing: 2px; font-family: Georgia, serif;">
            UPDATE ITEM
        </button>
    </form>
</div>

<div id="confirm-modal" style="display:none; position:fixed; top:0; left:0; width:100%;
     height:100%; background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#FFFEF2; border-radius:12px; padding:40px; max-width:400px;
                width:90%; text-align:center; font-family:Georgia, serif;
                border-top: 5px solid #8B0000;">
        <h3 style="color:#2C2416; font-size:22px; margin-bottom:15px;">Confirm Update</h3>
        <p style="color:#5C4033; font-size:16px; margin-bottom:30px;">
            Are you sure you want to update this menu item?
        </p>
        <div style="display:flex; gap:15px; justify-content:center;">
            <button onclick="closeConfirm()"
                style="padding:12px 30px; background:white; color:#2C2416;
                       border:2px solid #D4AF37; border-radius:8px; font-family:Georgia, serif;
                       font-size:16px; font-weight:bold; cursor:pointer;">
                Cancel
            </button>
            <button onclick="submitForm()"
                style="padding:12px 30px; background:#8B0000; color:#FFD700;
                       border:none; border-radius:8px; font-family:Georgia, serif;
                       font-size:16px; font-weight:bold; cursor:pointer;">
                Yes, Update
            </button>
        </div>
    </div>
</div>

<script>
function selectCategory(name, btn) {
    document.querySelectorAll('.category-btn').forEach(b => {
        b.style.background = 'white';
        b.style.color = '#2C2416';
        b.style.borderColor = '#D4AF37';
    });
    btn.style.background = '#8B0000';
    btn.style.color = '#FFD700';
    btn.style.borderColor = '#8B0000';
    document.getElementById('selected-category').value = name;
}

document.addEventListener('DOMContentLoaded', function() {
    const current = document.getElementById('selected-category').value;
    if (current) {
        document.querySelectorAll('.category-btn').forEach(btn => {
            if (btn.dataset.category === current) {
                btn.style.background = '#8B0000';
                btn.style.color = '#FFD700';
                btn.style.borderColor = '#8B0000';
            }
        });
    }
});

function showConfirm() {
    document.getElementById('confirm-modal').style.display = 'flex';
}

function closeConfirm() {
    document.getElementById('confirm-modal').style.display = 'none';
}

function submitForm() {
    document.querySelector('form').submit();
}

document.getElementById('confirm-modal').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
});
</script>
{% endblock %}

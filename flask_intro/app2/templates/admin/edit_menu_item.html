{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block content %}
<div class="form-page-wrap">
    <h1>Edit Menu Item</h1>
    <a href="{{ url_for('admin.manage_menu') }}" class="back-link">← Back to Menu Management</a>

    <div class="form-card">
        <form method="POST" id="edit-form">

            <div class="form-group">
                <label class="form-label" for="item_name">Item Name</label>
                <input class="form-input" type="text" id="item_name" name="item_name"
                       value="{{ item.item_name }}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>
                <div class="category-picker">
                    {% for cat in categories %}
                    <button type="button"
                            class="category-btn {% if cat.category_name == item.category %}selected{% endif %}"
                            data-category="{{ cat.category_name }}"
                            onclick="selectCategory('{{ cat.category_name }}', this)">
                        {{ cat.category_name }}
                    </button>
                    {% endfor %}
                </div>
                <input type="hidden" id="selected-category" name="category" value="{{ item.category }}">
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea class="form-textarea" id="description" name="description"
                          rows="4" required>{{ item.description }}</textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="price">Price (£)</label>
                <input class="form-input" type="number" id="price" name="price"
                       step="0.01" min="0" value="{{ item.price }}" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="is_available">Availability</label>
                <select class="form-select" id="is_available" name="is_available" required>
                    <option value="1" {% if item.is_available %}selected{% endif %}>Available</option>
                    <option value="0" {% if not item.is_available %}selected{% endif %}>Sold Out</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="prep_time">Prep Time (minutes)</label>
                <input class="form-input" type="number" name="prep_time" id="prep_time"
                       value="{{ item.prep_time }}" min="1" max="60" required>
            </div>

            <button type="button" class="btn-submit" onclick="showConfirm()">Update Item</button>

        </form>
    </div>
</div>
<!-- Confirmation modal -->
<div id="confirm-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
        <h3 id="modal-title">Confirm Update</h3>
        <p>Are you sure you want to update this menu item?</p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
            <button class="btn-confirm" onclick="submitForm()">Yes, Update</button>
        </div>
    </div>
</div>
<script>
    function selectCategory(name, btn) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('selected-category').value = name;
    }

    function showConfirm() {
        document.getElementById('confirm-modal').classList.add('open');
    }

    function closeConfirm() {
        document.getElementById('confirm-modal').classList.remove('open');
    }

    function submitForm() {
        document.getElementById('edit-form').submit();
    }

    document.getElementById('confirm-modal').addEventListener('click', function (e) {
        if (e.target === this) closeConfirm();
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeConfirm();
    });
</script>
{% endblock %}

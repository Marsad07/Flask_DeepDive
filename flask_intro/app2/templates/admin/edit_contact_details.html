{% extends "base.html" %}

{% block header %}{% endblock %}

{% block content %}
<div class="dash-page">
  <!-- This is for the top header row -->
  <div class="dash-header">
    <h1>Manage Contact Details</h1>
    <a href="{{ url_for('admin.dashboard') }}" class="btn-back">← Back to Dashboard</a>
  </div>

  <!-- This is for the contact details card -->
  <p class="dash-section-title">Update Contact Information</p>
  <div class="dash-card">
    <div class="dash-card-body">

      <!-- This is the form -->
      <form method="POST" id="contact-form">

        <!-- Restaurant Address -->
        <div class="form-group">
          <label class="form-label">Restaurant Address</label>
          <textarea name="address" rows="3" class="form-textarea" required>{{ info.address }}</textarea>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="text" name="phone" class="form-input"
                 pattern="[0-9]{10,}"
                 placeholder="Enter phone number (numbers only)"
                 value="{{ info.phone }}" required>
        </div>

        <!-- Email Address -->
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-input"
                 value="{{ info.email }}" required>
        </div>

        <!-- Update button -->
        <button type="button" class="btn-primary" onclick="openConfirm()">
          Update Contact Details
        </button>

      </form>

    </div>
  </div>
</div>
<!-- This is for the confirmation modal -->
<div id="confirm-modal" class="modal-overlay">
  <div class="modal-box">
    <h3 class="modal-title">Confirm Update</h3>
    <p class="modal-message">
      Are you sure you want to update the restaurant contact details?
    </p>

    <div class="modal-actions">
      <button onclick="closeConfirm()" class="modal-btn-cancel">Cancel</button>
      <button onclick="submitContactForm()" class="modal-btn-confirm">Confirm</button>
    </div>
  </div>
</div>
<script>
  // This opens the confirmation modal
  function openConfirm() {
    document.getElementById("confirm-modal").style.display = "flex";
  }

  // This closes the modal
  function closeConfirm() {
    document.getElementById("confirm-modal").style.display = "none";
  }

  // This submits the form after confirmation
  function submitContactForm() {
    document.getElementById("contact-form").submit();
  }

  // This closes modal when clicking outside the box
  document.getElementById("confirm-modal").addEventListener("click", function(e) {
    if (e.target === this) closeConfirm();
  });
</script>
{% endblock %}

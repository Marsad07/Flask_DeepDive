{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<!-- Toast notification -->
<div id="toast" class="toast">
    <span class="toast-icon">⚠️</span>
    <span id="toast-msg"></span>
    <button class="toast-close" onclick="closeToast()">✕</button>
</div>

<div class="login-page">
    <div class="login-card login-card-staff">

        <h1 class="login-title">Staff Portal</h1>
        <p class="login-subtitle">Restaurant Management Login</p>

        <!-- Customer / Staff toggle -->
        <div class="toggle-wrap">
            <div class="toggle-slider toggle-slider-staff" id="toggle-slider"></div>
            <button type="button" class="toggle-btn" id="btn-customer" onclick="leftClick()">
                Customer
            </button>
            <button type="button" class="toggle-btn active" id="btn-staff" onclick="rightClick()">
                Staff
            </button>
        </div>

        <!-- Login form -->
        <form method="POST" class="login-form">
            <div class="field-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="field-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <input type="submit" value="LOGIN" class="submit-staff">
        </form>

        <p class="login-link" style="margin-top: 24px;">
            <a href="{{ url_for('general.home_page') }}">← Back to Main Site</a>
        </p>

    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    {% if error %}
    window.addEventListener('DOMContentLoaded', function() {
        showToast("{{ error }}");
    });
    {% endif %}

    function showToast(message) {
        document.getElementById('toast-msg').textContent = message;
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(closeToast, 4000);
    }

    function closeToast() {
        document.getElementById('toast').classList.remove('show');
    }

    var slider = document.getElementById('toggle-slider');

    function leftClick() {
        slider.style.left = '4px';
        document.getElementById('btn-customer').classList.add('active');
        document.getElementById('btn-staff').classList.remove('active');
        setTimeout(function() {
            window.location.href = "{{ url_for('customer_auth.login') }}";
        }, 350);
    }

    function rightClick() {
        slider.style.left = 'calc(50%)';
        document.getElementById('btn-staff').classList.add('active');
        document.getElementById('btn-customer').classList.remove('active');
        setTimeout(function() {
            window.location.href = "{{ url_for('staff.staff_login') }}";
        }, 350);
    }
</script>
{% endblock %}
